{% extends "base.html" %}
{% block title %}Record Sale{% endblock %}
{% block page_title %}Record New Sale{% endblock %}

{% block content %}
<div class="card card-warning">
  <div class="card-body">
    <form method="POST" action="{{ url_for('add_sale') }}">
      <div class="form-group">
        <label>Product</label>
        <select name="product_id" class="form-control" required>
          <option value="">Select a product...</option>
          {% for product in products %}
          <option value="{{ product.id }}">{{ product.name }} (Available: {{ product.current_quantity }} {{ product.unit }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Client Name</label>
            <input type="text" name="client_name" class="form-control" placeholder="e.g., Walk-in Customer" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Client Phone</label>
            <input type="text" name="client_phone" class="form-control" placeholder="Optional">
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Quantity Sold</label>
            <input type="number" step="0.01" name="quantity" class="form-control" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Price per Unit</label>
            <input type="number" step="0.01" name="price_per_unit" class="form-control" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" name="sale_date" class="form-control" value="{{ today }}" required>
      </div>
      
      <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" class="form-control" rows="3" placeholder="Payment method, delivery details, etc."></textarea>
      </div>

      <button type="submit" class="btn btn-warning">Confirm Sale & Deduct Stock</button>
    </form>
  </div>
</div>
{% endblock %}
